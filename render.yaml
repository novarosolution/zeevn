services:
  - type: web
    name: zeevn-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_MAPS_ROUTES_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: zeevn-web
    runtime: static
    buildCommand: npm install && npm run export:web
    publishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        sync: false
